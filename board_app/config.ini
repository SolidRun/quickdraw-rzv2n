# ═══════════════════════════════════════════════════════════════
# Quick Draw — Runtime Configuration
# Edit this file to change settings without rebuilding.
# ═══════════════════════════════════════════════════════════════

[model]
# Model base directory (contains model subdirectory)
model_dir = model

# Model subdirectory name (inside model_dir)
model_name = qd_mobilenetv2

# Class labels file (one name per line)
labels = labels.txt

# Model input size (NxN pixels)
input_size = 128

[drpai]
# DRP core frequency index
#   2 = 420 MHz (fastest)
#   3 = 315 MHz
#   4 = 252 MHz
#   5 = 210 MHz
drp_max_freq = 2

# AI-MAC frequency index
#   1 = 1 GHz (fastest)
#   3 = 630 MHz
#   4 = 420 MHz
#   5 = 315 MHz
drpai_freq = 1

[ui]
# Path to JSON config for colors, comments, and UI layout
config_json = config.json
